name: AURORA India Dashboard

on:
  workflow_dispatch:
    inputs:
      market_cache_mode:
        description: "Market cache integration mode"
        required: false
        default: "off"
        type: choice
        options:
          - off
          - dry-run
          - apply
      market_cache_snapshot:
        description: "Market cache snapshot type"
        required: false
        default: "latest"
        type: choice
        options:
          - latest
          - weekly
          - monthly
      market_cache_snapshot_id:
        description: "Snapshot id: latest, YYYY-WW, or YYYY-MM"
        required: false
        default: "latest"
      active_ledger_mode:
        description: "Active tracking ledger population mode"
        required: false
        default: "off"
        type: choice
        options:
          - off
          - dry-run
          - apply
  schedule:
    - cron: "30 3 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-india-dashboard
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Gate scheduled run to 9am IST trading day
        if: github.event_name == 'schedule'
        run: node scripts/india-time-gate.mjs

      - name: Install India dashboard dependencies
        if: github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1'
        run: npm ci --prefix markets/india/dashboard

      - name: Restore India market cache
        if: github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1'
        env:
          AURORA_MARKET_CACHE_PAT: ${{ secrets.AURORA_MARKET_CACHE_PAT }}
        run: |
          MODE="${{ github.event.inputs.market_cache_mode || 'off' }}"
          SNAPSHOT="${{ github.event.inputs.market_cache_snapshot || 'latest' }}"
          SNAPSHOT_ID="${{ github.event.inputs.market_cache_snapshot_id || 'latest' }}"

          if [ "$MODE" = "off" ]; then
            echo "Market cache restore disabled."
            exit 0
          fi

          if [ -z "${AURORA_MARKET_CACHE_PAT:-}" ]; then
            if [ "$MODE" = "apply" ]; then
              echo "AURORA_MARKET_CACHE_PAT is required for apply mode."
              exit 1
            fi
            echo "AURORA_MARKET_CACHE_PAT missing; dry-run restore skipped."
            exit 0
          fi

          CACHE_REPO_DIR="$RUNNER_TEMP/aurora-market-cache"
          git -c http.extraheader="AUTHORIZATION: bearer ${AURORA_MARKET_CACHE_PAT}" clone \
            https://github.com/mohitgargcanada-max/aurora-market-cache.git \
            "$CACHE_REPO_DIR"

          if [ "$MODE" = "apply" ]; then
            node scripts/market-cache/restore-market-cache.mjs \
              --market india \
              --target markets/india/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --apply
          else
            node scripts/market-cache/restore-market-cache.mjs \
              --market india \
              --target markets/india/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --dry-run
          fi

      - name: Run India dashboard
        if: github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1'
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          TAPETIDE_TOKEN: ${{ secrets.TAPETIDE_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: bash scripts/run-market.sh india

      - name: Populate India active tracking ledger
        if: success() && github.event_name == 'workflow_dispatch'
        run: |
          MODE="${{ github.event.inputs.active_ledger_mode || 'off' }}"

          if [ "$MODE" = "off" ]; then
            echo "Active ledger population disabled."
            exit 0
          fi

          AS_OF="$(date -u +%F)"

          if [ "$MODE" = "apply" ]; then
            node scripts/active-ledger/populate-active-tracking-ledger.mjs \
              --market india \
              --ledger markets/india/dashboard/state/active-tracking-ledger.json \
              --scan-file markets/india/dashboard/data/india-full-dashboard-scan.json \
              --as-of "$AS_OF" \
              --apply
          else
            node scripts/active-ledger/populate-active-tracking-ledger.mjs \
              --market india \
              --ledger markets/india/dashboard/state/active-tracking-ledger.json \
              --scan-file markets/india/dashboard/data/india-full-dashboard-scan.json \
              --as-of "$AS_OF" \
              --dry-run
          fi

      - name: Back up India market cache
        if: success() && (github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1')
        env:
          AURORA_MARKET_CACHE_PAT: ${{ secrets.AURORA_MARKET_CACHE_PAT }}
        run: |
          MODE="${{ github.event.inputs.market_cache_mode || 'off' }}"
          SNAPSHOT="${{ github.event.inputs.market_cache_snapshot || 'latest' }}"
          SNAPSHOT_ID="${{ github.event.inputs.market_cache_snapshot_id || 'latest' }}"

          if [ "$MODE" = "off" ]; then
            echo "Market cache backup disabled."
            exit 0
          fi

          if [ -z "${AURORA_MARKET_CACHE_PAT:-}" ]; then
            if [ "$MODE" = "apply" ]; then
              echo "AURORA_MARKET_CACHE_PAT is required for apply mode."
              exit 1
            fi
            echo "AURORA_MARKET_CACHE_PAT missing; dry-run backup skipped."
            exit 0
          fi

          CACHE_REPO_DIR="$RUNNER_TEMP/aurora-market-cache"
          if [ ! -d "$CACHE_REPO_DIR/.git" ]; then
            git -c http.extraheader="AUTHORIZATION: bearer ${AURORA_MARKET_CACHE_PAT}" clone \
              https://github.com/mohitgargcanada-max/aurora-market-cache.git \
              "$CACHE_REPO_DIR"
          fi

          if [ "$MODE" = "apply" ]; then
            node scripts/market-cache/backup-market-cache.mjs \
              --market india \
              --source markets/india/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --apply

            cd "$CACHE_REPO_DIR"
            if [ -n "$(git status --short)" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add .
              git commit -m "cache: update india $SNAPSHOT $SNAPSHOT_ID from ${GITHUB_SHA::7}"
              git -c http.extraheader="AUTHORIZATION: bearer ${AURORA_MARKET_CACHE_PAT}" push origin HEAD
            else
              echo "No cache changes to push."
            fi
          else
            node scripts/market-cache/backup-market-cache.mjs \
              --market india \
              --source markets/india/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --dry-run
          fi

      - name: Commit updated India outputs
        if: github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add markets/india/dashboard/data markets/india/dashboard/cache markets/india/AURORA_India_Unified_Dashboard.html
          if ! git diff --cached --quiet; then
            git commit -m "Update AURORA India dashboard"
            git push
          else
            echo "No India dashboard changes to commit."
          fi

      - name: Prepare GitHub Pages artifact
        if: success() && (github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1')
        run: bash scripts/prepare-india-pages-artifact.sh public

      - name: Configure GitHub Pages
        if: success() && (github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1')
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: success() && (github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1')
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: success() && (github.event_name != 'schedule' || env.RUN_INDIA_DASHBOARD == '1')
        id: deployment
        uses: actions/deploy-pages@v4
