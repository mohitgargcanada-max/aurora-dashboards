name: AURORA India Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 0-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-india-dashboard
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install India dashboard dependencies
        run: npm ci --prefix markets/india/dashboard

      - name: Run India dashboard
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          TAPETIDE_TOKEN: ${{ secrets.TAPETIDE_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: bash scripts/run-market.sh india

      - name: Commit updated India outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add markets/india/dashboard/data markets/india/dashboard/cache markets/india/AURORA_India_Unified_Dashboard.html
          if ! git diff --cached --quiet; then
            git commit -m "Update AURORA India dashboard"
            git push
          else
            echo "No India dashboard changes to commit."
          fi

      - name: Prepare GitHub Pages artifact
        if: success()
        run: bash scripts/prepare-india-pages-artifact.sh public

      - name: Configure GitHub Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
