name: AURORA Canada Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 0-5"
    - cron: "0 14 * * 0-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-canada-dashboard
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Gate scheduled run to 9am New York/Toronto
        if: github.event_name == 'schedule'
        run: node scripts/nyse-time-gate.mjs

      - name: Install Canada dashboard dependencies
        run: npm ci --prefix markets/canada/dashboard

      - name: Run Canada dashboard validation
        run: |
          npm --prefix markets/canada/dashboard test
          npm --prefix markets/canada/dashboard run cache:refresh:indices
          npm --prefix markets/canada/dashboard run cache:audit:indices
          npm --prefix markets/canada/dashboard run scan:full
          npm --prefix markets/canada/dashboard run scan:weekday
          bash -n scripts/prepare-canada-pages-artifact.sh

      - name: Prepare GitHub Pages artifact
        if: success()
        run: bash scripts/prepare-canada-pages-artifact.sh public

      - name: Configure GitHub Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
