name: AURORA Canada Dashboard

on:
  pull_request:
    paths:
      - ".github/workflows/canada-dashboard.yml"
      - "markets/canada/**"
      - "scripts/canada-time-gate.mjs"
      - "scripts/prepare-canada-pages-artifact.sh"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/canada-dashboard.yml"
      - "markets/canada/**"
      - "scripts/canada-time-gate.mjs"
      - "scripts/prepare-canada-pages-artifact.sh"
  workflow_dispatch:
    inputs:
      eodhd_fallback_test_symbol:
        description: "Optional Canada symbol for forced Yahoo-failure EODHD fallback verification, e.g. RY.TO"
        required: false
        default: ""
      market_cache_mode:
        description: "Market cache integration mode"
        required: false
        default: "off"
        type: choice
        options:
          - "off"
          - "dry-run"
          - "apply"
      market_cache_snapshot:
        description: "Market cache snapshot type"
        required: false
        default: "latest"
        type: choice
        options:
          - latest
          - weekly
          - monthly
      market_cache_snapshot_id:
        description: "Snapshot id: latest, YYYY-WW, or YYYY-MM"
        required: false
        default: "latest"
      active_ledger_mode:
        description: "Active tracking ledger population mode"
        required: false
        default: "off"
        type: choice
        options:
          - "off"
          - "dry-run"
          - "apply"
  schedule:
    - cron: "0 13 * * 1-5"
    - cron: "0 14 * * 1-5"

permissions:
  contents: read

concurrency:
  group: canada-dashboard-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Gate scheduled run to 9:00 AM Toronto trading day
        if: github.event_name == 'schedule'
        run: node scripts/canada-time-gate.mjs

      - name: Install Canada dashboard dependencies
        if: github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1'
        run: npm ci --prefix markets/canada/dashboard

      - name: Run Canada PR validation
        if: github.event_name == 'pull_request'
        run: |
          npm --prefix markets/canada/dashboard test
          npm --prefix markets/canada/dashboard run scan:smoke
          bash -n scripts/prepare-canada-pages-artifact.sh

      - name: Restore Canada market cache
        if: github.event_name != 'pull_request' && (github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1')
        env:
          AURORA_MARKET_CACHE_PAT: ${{ secrets.AURORA_MARKET_CACHE_PAT }}
        run: |
          MODE="${{ github.event.inputs.market_cache_mode || 'off' }}"
          SNAPSHOT="${{ github.event.inputs.market_cache_snapshot || 'latest' }}"
          SNAPSHOT_ID="${{ github.event.inputs.market_cache_snapshot_id || 'latest' }}"

          if [ "$MODE" = "off" ]; then
            echo "Market cache restore disabled."
            exit 0
          fi

          if [ -z "${AURORA_MARKET_CACHE_PAT:-}" ]; then
            if [ "$MODE" = "apply" ]; then
              echo "AURORA_MARKET_CACHE_PAT is required for apply mode."
              exit 1
            fi
            echo "AURORA_MARKET_CACHE_PAT missing; dry-run restore skipped."
            exit 0
          fi

          CACHE_REPO_DIR="$RUNNER_TEMP/aurora-market-cache"
          git -c http.extraheader="AUTHORIZATION: bearer ${AURORA_MARKET_CACHE_PAT}" clone \
            https://github.com/mohitgargcanada-max/aurora-market-cache.git \
            "$CACHE_REPO_DIR"

          if [ "$MODE" = "apply" ]; then
            node scripts/market-cache/restore-market-cache.mjs \
              --market canada \
              --target markets/canada/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --apply
          else
            node scripts/market-cache/restore-market-cache.mjs \
              --market canada \
              --target markets/canada/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --dry-run
          fi

      - name: Run Canada dashboard validation
        if: github.event_name != 'pull_request' && (github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1')
        env:
          AURORAKEYS: ${{ secrets.AURORAKEYS }}
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN || secrets.EODHD_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY || secrets.EODHD_API_TOKEN }}
        run: |
          npm --prefix markets/canada/dashboard test
          npm --prefix markets/canada/dashboard run cache:refresh:indices
          npm --prefix markets/canada/dashboard run cache:audit:indices
          npm --prefix markets/canada/dashboard run scan:full
          npm --prefix markets/canada/dashboard run scan:weekday
          bash -n scripts/prepare-canada-pages-artifact.sh

      - name: Run Canada EODHD fallback verification
        if: github.event_name == 'workflow_dispatch' && inputs.eodhd_fallback_test_symbol != ''
        env:
          AURORAKEYS: ${{ secrets.AURORAKEYS }}
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN || secrets.EODHD_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY || secrets.EODHD_API_TOKEN }}
          AURORA_CANADA_EODHD_FALLBACK_TEST_SYMBOL: ${{ inputs.eodhd_fallback_test_symbol }}
          AURORA_FORCE_CANADA_YAHOO_FAIL_FOR: ${{ inputs.eodhd_fallback_test_symbol }}
        run: npm --prefix markets/canada/dashboard run test:eodhd:fallback

  deploy-pages:
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Gate scheduled run to 9:00 AM Toronto trading day
        if: github.event_name == 'schedule'
        run: node scripts/canada-time-gate.mjs

      - name: Install Canada dashboard dependencies
        if: github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1'
        run: npm ci --prefix markets/canada/dashboard

      - name: Restore Canada market cache
        if: github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1'
        env:
          AURORA_MARKET_CACHE_PAT: ${{ secrets.AURORA_MARKET_CACHE_PAT }}
        run: |
          MODE="${{ github.event.inputs.market_cache_mode || 'off' }}"
          SNAPSHOT="${{ github.event.inputs.market_cache_snapshot || 'latest' }}"
          SNAPSHOT_ID="${{ github.event.inputs.market_cache_snapshot_id || 'latest' }}"

          if [ "$MODE" = "off" ]; then
            echo "Market cache restore disabled."
            exit 0
          fi

          if [ -z "${AURORA_MARKET_CACHE_PAT:-}" ]; then
            if [ "$MODE" = "apply" ]; then
              echo "AURORA_MARKET_CACHE_PAT is required for apply mode."
              exit 1
            fi
            echo "AURORA_MARKET_CACHE_PAT missing; dry-run restore skipped."
            exit 0
          fi

          CACHE_REPO_DIR="$RUNNER_TEMP/aurora-market-cache"
          git -c http.extraheader="AUTHORIZATION: bearer ${AURORA_MARKET_CACHE_PAT}" clone \
            https://github.com/mohitgargcanada-max/aurora-market-cache.git \
            "$CACHE_REPO_DIR"

          if [ "$MODE" = "apply" ]; then
            node scripts/market-cache/restore-market-cache.mjs \
              --market canada \
              --target markets/canada/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --apply
          else
            node scripts/market-cache/restore-market-cache.mjs \
              --market canada \
              --target markets/canada/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --dry-run
          fi

      - name: Generate Canada dashboard
        if: github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1'
        env:
          AURORAKEYS: ${{ secrets.AURORAKEYS }}
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN || secrets.EODHD_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY || secrets.EODHD_API_TOKEN }}
        run: |
          npm --prefix markets/canada/dashboard run cache:refresh:indices
          npm --prefix markets/canada/dashboard run cache:audit:indices
          npm --prefix markets/canada/dashboard run scan:full
          npm --prefix markets/canada/dashboard run scan:weekday

      - name: Populate Canada active tracking ledger
        if: success() && github.event_name == 'workflow_dispatch'
        run: |
          MODE="${{ github.event.inputs.active_ledger_mode || 'off' }}"

          if [ "$MODE" = "off" ]; then
            echo "Active ledger population disabled."
            exit 0
          fi

          AS_OF="$(date -u +%F)"

          if [ "$MODE" = "apply" ]; then
            node scripts/active-ledger/populate-active-tracking-ledger.mjs \
              --market canada \
              --ledger markets/canada/dashboard/state/active-tracking-ledger.json \
              --scan-file markets/canada/dashboard/data/canada-full-dashboard-scan.json \
              --as-of "$AS_OF" \
              --apply
          else
            node scripts/active-ledger/populate-active-tracking-ledger.mjs \
              --market canada \
              --ledger markets/canada/dashboard/state/active-tracking-ledger.json \
              --scan-file markets/canada/dashboard/data/canada-full-dashboard-scan.json \
              --as-of "$AS_OF" \
              --dry-run
          fi

      - name: Back up Canada market cache
        if: success() && (github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1')
        env:
          AURORA_MARKET_CACHE_PAT: ${{ secrets.AURORA_MARKET_CACHE_PAT }}
        run: |
          MODE="${{ github.event.inputs.market_cache_mode || 'off' }}"
          SNAPSHOT="${{ github.event.inputs.market_cache_snapshot || 'latest' }}"
          SNAPSHOT_ID="${{ github.event.inputs.market_cache_snapshot_id || 'latest' }}"

          if [ "$MODE" = "off" ]; then
            echo "Market cache backup disabled."
            exit 0
          fi

          if [ -z "${AURORA_MARKET_CACHE_PAT:-}" ]; then
            if [ "$MODE" = "apply" ]; then
              echo "AURORA_MARKET_CACHE_PAT is required for apply mode."
              exit 1
            fi
            echo "AURORA_MARKET_CACHE_PAT missing; dry-run backup skipped."
            exit 0
          fi

          CACHE_REPO_DIR="$RUNNER_TEMP/aurora-market-cache"
          if [ ! -d "$CACHE_REPO_DIR/.git" ]; then
            git -c http.extraheader="AUTHORIZATION: bearer ${AURORA_MARKET_CACHE_PAT}" clone \
              https://github.com/mohitgargcanada-max/aurora-market-cache.git \
              "$CACHE_REPO_DIR"
          fi

          if [ "$MODE" = "apply" ]; then
            node scripts/market-cache/backup-market-cache.mjs \
              --market canada \
              --source markets/canada/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --apply

            cd "$CACHE_REPO_DIR"
            if [ -n "$(git status --short)" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add .
              git commit -m "cache: update canada $SNAPSHOT $SNAPSHOT_ID from ${GITHUB_SHA::7}"
              git -c http.extraheader="AUTHORIZATION: bearer ${AURORA_MARKET_CACHE_PAT}" push origin HEAD
            else
              echo "No cache changes to push."
            fi
          else
            node scripts/market-cache/backup-market-cache.mjs \
              --market canada \
              --source markets/canada/dashboard/cache \
              --cache-repo "$CACHE_REPO_DIR" \
              --snapshot "$SNAPSHOT" \
              --snapshot-id "$SNAPSHOT_ID" \
              --dry-run
          fi

      - name: Prepare unified GitHub Pages artifact
        if: success() && (github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1')
        run: bash scripts/prepare-canada-pages-artifact.sh public

      - name: Configure GitHub Pages
        if: success() && (github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1')
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: success() && (github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1')
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: success() && (github.event_name != 'schedule' || env.RUN_CANADA_DASHBOARD == '1')
        id: deployment
        uses: actions/deploy-pages@v4
