name: AURORA US Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 0-5"
    - cron: "0 14 * * 0-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-us-dashboard
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Resolve Chrome path
        run: |
          if command -v google-chrome-stable >/dev/null; then
            echo "CHROMIUM_PATH=$(command -v google-chrome-stable)" >> "$GITHUB_ENV"
          elif command -v google-chrome >/dev/null; then
            echo "CHROMIUM_PATH=$(command -v google-chrome)" >> "$GITHUB_ENV"
          elif command -v chromium-browser >/dev/null; then
            echo "CHROMIUM_PATH=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          elif command -v chromium >/dev/null; then
            echo "CHROMIUM_PATH=$(command -v chromium)" >> "$GITHUB_ENV"
          else
            echo "No Chrome/Chromium binary found; visual validation may be skipped by runner."
          fi

      - name: Gate scheduled run to 9am New York
        if: github.event_name == 'schedule'
        run: node scripts/nyse-time-gate.mjs

      - name: Load bundled Aurora secrets
        env:
          AURORAKEYS: ${{ secrets.AURORAKEYS }}
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const allowed = new Set(["EODHD_API_TOKEN", "EODHD_API_KEY", "SEC_USER_AGENT", "TAVILY_API_KEY", "FIRECRAWL_API_KEY"]);
          const eodhdAliases = ["EODHD_API_TOKEN", "EODHD_API_KEY", "EODHD_API", "EODHD_TOKEN", "EODHD_KEY", "EODHD", "EODHD_TOKEN_VALUE", "EODHD_SECRET", "EODHD_CREDENTIAL", "EOD_API_TOKEN", "EOD_API_KEY", "EOD_TOKEN", "EOD_KEY", "EOD", "EOD_HISTORICAL_DATA_API_KEY", "EOD_HISTORICAL_DATA_API_TOKEN", "EOD_HISTORICAL_DATA_TOKEN", "EOD_HISTORICAL_DATA_KEY", "EOD_HISTORICAL_DATA", "EODH_API_KEY", "EODH_TOKEN", "EODH_KEY", "EODHD_APIKEY", "EODHDAPIKEY", "EODHDTOKEN"].map(normalizeKey);
          const identityFields = ["name", "provider", "service", "source", "connector", "id", "key"];
          const valueFields = ["value", "secret", "token", "api_token", "apiToken", "api_key", "apiKey", "credential", "key"];
          function normalizeKey(key) {
            return String(key || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
          }
          function primitiveValue(value) {
            return value === null || value === undefined || typeof value === "object" ? "" : String(value);
          }
          function isEodhdCredentialKey(key) {
            const normalized = normalizeKey(key);
            if (eodhdAliases.some(alias => normalized === alias || normalized.endsWith(alias))) return true;
            const namesEodhd = normalized.includes("EODHD") || normalized.includes("EODHISTORICALDATA") || normalized.includes("EOD");
            const namesSecret = ["API", "TOKEN", "KEY", "SECRET", "CREDENTIAL"].some(part => normalized.includes(part));
            return namesEodhd && namesSecret;
          }
          function addStructuredSecretAlias(value, out) {
            if (!value || typeof value !== "object" || Array.isArray(value)) return;
            const identity = identityFields.map(field => primitiveValue(value[field])).find(Boolean);
            if (!identity || !isEodhdCredentialKey(identity)) return;
            const secret = valueFields.map(field => primitiveValue(value[field])).find(Boolean);
            if (secret) out[identity] = secret;
          }
          function flatten(value, prefix = "", out = {}) {
            if (!value || typeof value !== "object") return out;
            if (Array.isArray(value)) {
              value.forEach((item, index) => flatten(item, prefix ? `${prefix}_${index}` : String(index), out));
              return out;
            }
            addStructuredSecretAlias(value, out);
            for (const [key, item] of Object.entries(value)) {
              const path = prefix ? `${prefix}_${key}` : key;
              if (item && typeof item === "object") flatten(item, path, out);
              else out[path] = item;
            }
            return out;
          }
          function parse(raw) {
            const text = String(raw || "").trim();
            if (!text) return {};
            try {
              const json = JSON.parse(text);
              return json && typeof json === "object" && !Array.isArray(json) ? flatten(json) : {};
            } catch {}
            const out = {};
            for (const line of text.split(/\r?\n/)) {
              const trimmed = line.trim().replace(/^export\s+/i, "");
              if (!trimmed || trimmed.startsWith("#")) continue;
              const index = trimmed.indexOf("=");
              if (index <= 0) continue;
              const key = trimmed.slice(0, index).trim();
              let value = trimmed.slice(index + 1).trim();
              if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) value = value.slice(1, -1);
              out[key] = value;
            }
            return out;
          }
          const bundled = parse(process.env.AURORAKEYS);
          const values = { ...bundled };
          if (process.env.EODHD_API_TOKEN) values.EODHD_API_TOKEN = process.env.EODHD_API_TOKEN;
          if (process.env.EODHD_API_KEY) values.EODHD_API_KEY = process.env.EODHD_API_KEY;
          if (process.env.SEC_USER_AGENT) values.SEC_USER_AGENT = process.env.SEC_USER_AGENT;
          if (process.env.TAVILY_API_KEY) values.TAVILY_API_KEY = process.env.TAVILY_API_KEY;
          if (process.env.FIRECRAWL_API_KEY) values.FIRECRAWL_API_KEY = process.env.FIRECRAWL_API_KEY;
          const eodhdEntry = Object.entries(values).find(([key, value]) => {
            return value && isEodhdCredentialKey(key);
          });
          if (eodhdEntry) {
            values.EODHD_API_TOKEN ||= eodhdEntry[1];
            values.EODHD_API_KEY ||= eodhdEntry[1];
          }
          const delimiter = `AURORA_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const lines = [];
          for (const [key, value] of Object.entries(values)) {
            if (!allowed.has(key) || !value) continue;
            lines.push(`${key}<<${delimiter}`, String(value), delimiter);
          }
          if (lines.length) fs.appendFileSync(process.env.GITHUB_ENV, `${lines.join("\n")}\n`);
          NODE

      - name: Run US dashboard
        if: github.event_name != 'schedule' || env.RUN_US_DASHBOARD == '1'
        env:
          AURORAKEYS: ${{ secrets.AURORAKEYS }}
        run: |
          cd markets/us/dashboard
          node scripts/refresh-or-repair-us-data.mjs
          node scripts/scan-universe.mjs
          node scripts/enrich-sector-classification.mjs
          node scripts/scan-universe.mjs
          node scripts/scan-rs-leadership.mjs
          node scripts/render-canonical.mjs
          npm test
          node tests/history-repair.test.mjs
          npm run build
          npm run validate
          if npm run visual:validate; then
            echo "US visual validation passed."
          else
            echo "US visual validation blocked or failed; dashboard generation still completed." >&2
          fi

      - name: Summarize US dashboard outputs
        if: always() && (github.event_name != 'schedule' || env.RUN_US_DASHBOARD == '1')
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("fs");
          function readJson(path) { try { return JSON.parse(fs.readFileSync(path, "utf8")); } catch { return null; } }
          function warningSummary(warnings = []) {
            const byProvider = {};
            for (const warning of Array.isArray(warnings) ? warnings : []) {
              const provider = warning.provider || "UNKNOWN";
              byProvider[provider] ||= { count: 0, samples: [] };
              byProvider[provider].count += 1;
              if (byProvider[provider].samples.length < 3) byProvider[provider].samples.push(warning.warning || "UNKNOWN");
            }
            return byProvider;
          }
          const dashboardPath = "markets/us/AURORA_US_Dashboard.html";
          const statePath = "markets/us/dashboard/data/us-dashboard-state.json";
          const rslePath = "markets/us/dashboard/data/rs-leadership-scan.json";
          const refreshPath = "markets/us/dashboard/data/us-daily-refresh-report.json";
          const historyPath = "markets/us/dashboard/data/us-history-repair-report.json";
          const wrapperPath = "markets/us/dashboard/data/us-refresh-or-repair-report.json";
          const refresh = readJson(refreshPath);
          const history = readJson(historyPath);
          const wrapper = readJson(wrapperPath);
          const state = readJson(statePath);
          const rsle = readJson(rslePath);
          console.log("## AURORA US Dashboard");
          console.log("");
          console.log(`- Dashboard HTML: \`${dashboardPath}\` ${fs.existsSync(dashboardPath) ? "present" : "missing"}`);
          console.log(`- Dashboard state: \`${statePath}\` ${state ? "present" : "missing/unreadable"}`);
          console.log(`- RSLE data: \`${rslePath}\` ${rsle ? "present" : "missing/unreadable"}`);
          console.log(`- Daily refresh report: \`${refreshPath}\` ${refresh ? "present" : "missing/unreadable"}`);
          console.log(`- 5Y history repair report: \`${historyPath}\` ${history ? "present" : "missing/unreadable"}`);
          console.log(`- Refresh-or-repair report: \`${wrapperPath}\` ${wrapper ? "present" : "missing/unreadable"}`);
          console.log("");
          console.log("### Data Provenance");
          for (const [label, report] of [["Daily", refresh], ["History", history], ["Wrapper", wrapper]]) {
            if (!report) continue;
            console.log(`- ${label} status: \`${report.status || report.final_status || "UNKNOWN"}\``);
            console.log(`- ${label} latest data as of: \`${report.latest_data_as_of || "NONE"}\``);
            console.log(`- ${label} provider counts: \`${JSON.stringify(report.provider_counts || {})}\``);
            const grouped = warningSummary(report.warnings || report.history_repair?.warnings || report.daily_refresh?.warnings);
            for (const [provider, info] of Object.entries(grouped)) console.log(`- ${label} warning summary: \`${provider}: ${info.count}; samples: ${info.samples.join(" | ")}\``);
          }
          if (rsle) {
            console.log(`- RSLE data_as_of: \`${rsle.data_as_of || "UNKNOWN"}\``);
            console.log(`- RSLE provider: \`${rsle.provider || "UNKNOWN"}\``);
            console.log(`- Universe/liquid/eligible: \`${rsle.universe_input_count ?? "?"}/${rsle.liquid_universe_count ?? "?"}/${rsle.eligible_setup_count ?? "?"}\``);
          }
          if (state) {
            console.log(`- Dashboard generated_at: \`${state.generated_at || "UNKNOWN"}\``);
            console.log(`- Dashboard data_as_of: \`${state.data_as_of || state.market_summary?.data_as_of || state.run?.data_as_of || "UNKNOWN"}\``);
            console.log(`- Dashboard run status: \`${state.run?.status || "UNKNOWN"}\``);
          }
          NODE

      - name: Commit updated US outputs
        if: always() && (github.event_name != 'schedule' || env.RUN_US_DASHBOARD == '1')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add markets/us/dashboard/data markets/us/dashboard/cache markets/us/AURORA_US_Dashboard.html
          if ! git diff --cached --quiet; then
            git commit -m "Update AURORA US dashboard"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "US output push rejected; rebasing on origin/${GITHUB_REF_NAME} and retrying (${attempt}/3)." >&2
              git fetch origin "${GITHUB_REF_NAME}"
              git rebase "origin/${GITHUB_REF_NAME}"
            done
            git push
          else
            echo "No US dashboard changes to commit."
          fi

      - name: Prepare GitHub Pages artifact
        if: success() && (github.event_name != 'schedule' || env.RUN_US_DASHBOARD == '1')
        run: |
          rm -rf public
          mkdir -p public/markets/us/dashboard
          cp markets/us/AURORA_US_Dashboard.html public/markets/us/AURORA_US_Dashboard.html
          cp -r markets/us/dashboard/data public/markets/us/dashboard/data
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=markets/us/AURORA_US_Dashboard.html">
              <title>AURORA Dashboard</title>
            </head>
            <body>
              <a href="markets/us/AURORA_US_Dashboard.html">Open AURORA US Dashboard</a>
            </body>
          </html>
          HTML
          touch public/.nojekyll

      - name: Configure GitHub Pages
        if: success() && (github.event_name != 'schedule' || env.RUN_US_DASHBOARD == '1')
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: success() && (github.event_name != 'schedule' || env.RUN_US_DASHBOARD == '1')
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: success() && (github.event_name != 'schedule' || env.RUN_US_DASHBOARD == '1')
        id: deployment
        uses: actions/deploy-pages@v4
